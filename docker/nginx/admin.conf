# Nginx configuration for Ads Platform
# Supports: multi-service upstream (horizontal scaling), CDN headers, gzip, rate limiting

upstream service_api {
    # Multiple service instances for horizontal scaling
    # Add more instances: server php2:8788 weight=1;
    server php:8788 weight=1 max_fails=3 fail_timeout=30s;
    keepalive 32;
    keepalive_timeout 60s;
    keepalive_requests 100;
}

upstream admin_backend {
    server admin-php:8789 weight=1 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security: limit request rate per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # ─── API proxy to service ───
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_conn conn 20;

        proxy_pass http://service_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_connect_timeout 5s;
        proxy_next_upstream error timeout invalid_header http_502 http_503;
        proxy_next_upstream_tries 2;
    }

    # ─── Health check ───
    location /health {
        proxy_pass http://service_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ─── Static assets with CDN-friendly headers ───
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
        add_header Vary "Accept-Encoding";
        gzip_static on;
    }

    # ─── Admin SPA ───
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # ─── Gzip ───
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain application/json application/javascript text/css image/svg+xml;
    gzip_proxied any;
}
